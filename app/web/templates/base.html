<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Bridge Bank{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="wrap">
    <a class="logo" href="/">
      <div class="logo-mark">&#x27F7;</div>
      <span class="logo-name">Bridge Bank</span>
    </a>
    {% block steps %}{% endblock %}
    {% block content %}{% endblock %}
    {% block nav %}
    <nav class="footer-nav">
      <a href="/setup" {% if active == 'license' %}class="active"{% endif %}>License</a>
      <a href="/setup/actual" {% if active == 'actual' %}class="active"{% endif %}>Actual Budget</a>
      <a href="/setup/notifications" {% if active == 'notifications' %}class="active"{% endif %}>Notifications</a>
      <a href="/connect" {% if active == 'connect' %}class="active"{% endif %}>Bank</a>
      <a href="/status" {% if active == 'status' %}class="active"{% endif %}>Status</a>
    </nav>
    {% endblock %}
  </div>
  <footer class="app-footer">
    <a href="mailto:support@david-alves.com">Support</a>
    <a href="https://bridgebank.app/privacy" target="_blank">Privacy</a>
    <a href="https://bridgebank.app/terms" target="_blank">Terms</a>
    <a href="https://github.com/DAdjadj/bridge-bank" target="_blank">GitHub</a>
  </footer>
</body>
</html>
